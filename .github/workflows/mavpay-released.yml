name: mavpay-release-dispatch

on:
  repository_dispatch:
    types: ["mavpay-release"]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      commit-ref: ${{ steps.push_changes.outputs.commit_sha }}

    steps:
      - uses: actions/checkout@v2

      - name: setup eli
        uses: alis-is/setup-eli@v1

      - name: update version
        id: update_version
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          # git checkout -b "$SOURCE-new-release"
          eli .github/update-mavpay-version.lua
          eli .github/get-specs-version.lua >> $GITHUB_OUTPUT

      - name: Add & Commit
        id: push_changes
        uses: EndBug/add-and-commit@v9
        with:
          add: '[ "src/__mvrk/sources.hjson", "src/specs.json" ]'
          push: true
          message: updated-mavpay-version
          author_name: MavpayReleaseDispatch
          author_email: mavpay.release.dispatch@alis.is
          branch: main

      - name: publish
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.update_version.outputs.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: build
    uses: ./.github/workflows/release.yml
    with:
      commit-ref: ${{needs.build.outputs.commit-ref}}
    secrets:
      MAVRYK_AMI_ACCESS_TOKEN: ${{ secrets.MAVRYK_AMI_ACCESS_TOKEN }}
      TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
